<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Словопад 🌈</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1:#0d1b4b; --bg2:#1a1060; --bg3:#2d1080; --bg4:#1a4060;
  --neon-blue:#4fc3f7; --neon-green:#39ff14; --neon-purple:#c084fc;
  --neon-pink:#f472b6; --neon-yellow:#fde047; --neon-orange:#fb923c;
  --glass:rgba(255,255,255,0.08); --glass-border:rgba(255,255,255,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Nunito',sans-serif; overflow:hidden;
  height:100vh; width:100vw;
  background:radial-gradient(ellipse at 30% 20%, #1e3a8a 0%, #1a1060 35%, #0d1b4b 60%, #0a2540 100%);
}

/* ── STARS CANVAS ── */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── AURORA RAYS ── */
#aurora{
  position:fixed;top:0;left:0;width:100%;height:55%;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 20% 60% at 35% 0%, rgba(79,195,247,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 15% 50% at 60% 0%, rgba(192,132,252,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 18% 55% at 50% 0%, rgba(57,255,20,0.08) 0%, transparent 70%);
  animation:aurora-shift 8s ease-in-out infinite;
}
@keyframes aurora-shift{
  0%,100%{opacity:1;transform:scaleX(1);}
  50%{opacity:0.7;transform:scaleX(1.08);}
}

/* ── FLOATING CLOUDS ── */
.cloud{position:fixed;z-index:2;pointer-events:none;animation:cloud-drift ease-in-out infinite;}
@keyframes cloud-drift{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

/* ── HUD ── */
#hud{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:30;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,0.18);
  border-radius:24px;
  padding:12px 28px;
  display:flex;align-items:center;gap:28px;
  box-shadow:0 4px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
  white-space:nowrap;
}
.hud-stat{display:flex;align-items:center;gap:8px;}
.hud-stat .ico{font-size:1.3rem;}
.hud-stat .val{
  font-family:'Comfortaa',cursive;font-size:1.25rem;font-weight:700;color:white;
  text-shadow:0 0 10px rgba(255,255,255,0.4);
}
#lives-val{display:flex;gap:2px;align-items:center;}
.heart{font-size:1.2rem;transition:transform 0.2s;}
.heart.lost{filter:grayscale(1);opacity:0.35;}

/* ── PROGRESS BAR ── */
#prog-wrap{
  position:fixed;top:82px;left:50%;transform:translateX(-50%);
  z-index:30;width:min(520px,88vw);
  display:flex;align-items:center;gap:10px;
}
#prog-bg{
  flex:1;height:12px;border-radius:10px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.12);
  overflow:hidden;
}
#prog-fill{
  height:100%;width:0%;border-radius:10px;
  background:linear-gradient(90deg,#4fc3f7,#39ff14);
  box-shadow:0 0 10px #4fc3f7;
  transition:width 0.4s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
#prog-fill::after{
  content:'';position:absolute;right:-4px;top:-2px;
  width:16px;height:16px;border-radius:50%;
  background:white;box-shadow:0 0 8px #4fc3f7;
}
#prog-lbl{font-size:0.8rem;font-weight:800;color:rgba(255,255,255,0.6);min-width:36px;text-align:right;}

/* ── GAME AREA ── */
#game-area{position:fixed;inset:0;z-index:10;overflow:hidden;pointer-events:none;}

/* ── FLOATING LETTERS (decoration) ── */
.deco-letter{
  position:fixed;z-index:3;pointer-events:none;
  font-family:'Comfortaa',cursive;font-weight:700;font-size:1.6rem;
  animation:deco-float ease-in-out infinite;
  opacity:0.5;
}
@keyframes deco-float{
  0%,100%{transform:translateY(0) rotate(-5deg);}
  50%{transform:translateY(-20px) rotate(5deg);}
}

/* ── WORD CARDS ── */
.word-card{
  position:absolute;top:-90px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border:1.5px solid rgba(255,255,255,0.25);
  border-radius:50px;
  padding:12px 28px;
  font-family:'Comfortaa',cursive;font-size:1.3rem;font-weight:700;
  color:white;white-space:nowrap;user-select:none;
  box-shadow:0 4px 20px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05) inset;
  letter-spacing:2px;
  animation:card-glow 2.5s ease-in-out infinite;
  text-shadow:0 0 12px rgba(255,255,255,0.5);
}
.word-card .blank{
  display:inline-block;min-width:16px;text-align:center;
  border-bottom:3px solid currentColor;font-weight:900;
  color:var(--neon-yellow);text-shadow:0 0 8px var(--neon-yellow);
}
.wc0{border-color:rgba(79,195,247,0.5);box-shadow:0 4px 25px rgba(79,195,247,0.2),0 0 0 1px rgba(79,195,247,0.1) inset;}
.wc1{border-color:rgba(192,132,252,0.5);box-shadow:0 4px 25px rgba(192,132,252,0.2),0 0 0 1px rgba(192,132,252,0.1) inset;}
.wc2{border-color:rgba(244,114,182,0.5);box-shadow:0 4px 25px rgba(244,114,182,0.2),0 0 0 1px rgba(244,114,182,0.1) inset;}
.wc3{border-color:rgba(57,255,20,0.4);box-shadow:0 4px 25px rgba(57,255,20,0.15),0 0 0 1px rgba(57,255,20,0.08) inset;}
.wc4{border-color:rgba(251,146,60,0.5);box-shadow:0 4px 25px rgba(251,146,60,0.2),0 0 0 1px rgba(251,146,60,0.1) inset;}
@keyframes card-glow{
  0%,100%{filter:brightness(1);}
  50%{filter:brightness(1.15);}
}
.word-card.hit-anim{animation:hit-burst 0.45s ease-out forwards!important;}
@keyframes hit-burst{
  0%{transform:scale(1);opacity:1;}
  40%{transform:scale(1.5);opacity:0.8;}
  100%{transform:scale(2.2) rotate(15deg);opacity:0;}
}
.word-card.miss-anim{animation:miss-sink 0.4s ease-in forwards!important;}
@keyframes miss-sink{to{transform:translateY(60px) scale(0.6);opacity:0;}}

/* ── INPUT ZONE ── */
#input-zone{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:50;width:min(560px,94vw);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
#input-row{display:flex;align-items:center;gap:10px;width:100%;}
#word-input{
  flex:1;
  font-family:'Comfortaa',cursive;font-size:1.3rem;font-weight:700;
  background:rgba(10,20,60,0.7);
  border:2px solid var(--neon-blue);
  border-radius:50px;color:white;
  padding:16px 28px;outline:none;text-align:center;
  letter-spacing:3px;
  box-shadow:0 0 20px rgba(79,195,247,0.25), inset 0 0 20px rgba(79,195,247,0.05);
  transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s;
  caret-color:var(--neon-blue);
}
#word-input::placeholder{color:rgba(255,255,255,0.25);font-size:0.95rem;letter-spacing:1px;}
#word-input:focus{
  border-color:var(--neon-purple);
  box-shadow:0 0 30px rgba(192,132,252,0.4),inset 0 0 20px rgba(192,132,252,0.05);
}
#word-input.ok{
  border-color:var(--neon-green)!important;
  box-shadow:0 0 40px rgba(57,255,20,0.5)!important;
  animation:ok-pop 0.3s;
}
#word-input.bad{
  border-color:#ef4444!important;
  box-shadow:0 0 40px rgba(239,68,68,0.4)!important;
  animation:bad-shake 0.3s;
}
@keyframes ok-pop{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes bad-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

#submit-btn{
  width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;
  background:linear-gradient(135deg,var(--neon-green),#16a34a);
  color:white;font-size:1.6rem;font-weight:900;
  box-shadow:0 0 20px rgba(57,255,20,0.4);
  transition:transform 0.15s,box-shadow 0.15s;
  display:none;align-items:center;justify-content:center;
}
#submit-btn:active{transform:scale(0.9);}

/* ── CORRECT BADGE ── */
#correct-badge{
  position:fixed;bottom:110px;left:50%;transform:translateX(-50%);
  z-index:60;pointer-events:none;
  font-family:'Comfortaa',cursive;font-size:1.1rem;font-weight:700;
  color:var(--neon-green);text-shadow:0 0 12px var(--neon-green);
  opacity:0;
  animation:none;
}
#correct-badge.show{animation:badge-pop 0.8s ease-out forwards;}
@keyframes badge-pop{0%{opacity:0;transform:translateX(-50%) scale(0.5);}20%{opacity:1;transform:translateX(-50%) scale(1.1);}80%{opacity:1;transform:translateX(-50%) scale(1);}100%{opacity:0;transform:translateX(-50%) scale(1);}}

/* ── COMBO ── */
#combo{
  position:fixed;top:110px;right:20px;z-index:30;
  background:rgba(251,146,60,0.12);backdrop-filter:blur(10px);
  border:2px solid var(--neon-orange);border-radius:20px;
  padding:10px 16px;text-align:center;
  opacity:0;transition:opacity 0.3s,transform 0.3s;transform:scale(0.8);
}
#combo.show{opacity:1;transform:scale(1);}
#combo-n{font-family:'Comfortaa',cursive;font-size:1.6rem;font-weight:700;color:var(--neon-orange);display:block;text-shadow:0 0 10px var(--neon-orange);}
#combo-lbl{font-size:0.6rem;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;font-weight:800;}

/* ── SPARKLES & FLOAT PTS ── */
.sparkle{position:fixed;pointer-events:none;z-index:70;font-size:1.2rem;animation:sp-fly 0.9s ease-out forwards;}
@keyframes sp-fly{to{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}}
.float-pts{position:fixed;pointer-events:none;z-index:70;font-family:'Comfortaa',cursive;font-size:1.5rem;font-weight:700;animation:fp-up 1s ease-out forwards;}
@keyframes fp-up{to{transform:translateY(-80px);opacity:0;}}

/* ── OVERLAY ── */
#overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(5,5,30,0.85);backdrop-filter:blur(14px);}
.ov-box{
  background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);
  border:1.5px solid rgba(255,255,255,0.15);border-radius:28px;
  padding:28px 28px 36px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  max-width:620px;width:95%;
}
.ov-title{font-family:'Comfortaa',cursive;font-size:2.6rem;font-weight:700;color:white;
  text-shadow:0 0 20px rgba(192,132,252,0.8);margin-bottom:18px;}
.play-btn{
  font-family:'Comfortaa',cursive;font-size:1.1rem;font-weight:700;
  padding:16px 48px;border:none;border-radius:50px;cursor:pointer;
  background:linear-gradient(135deg,#4fc3f7,#a855f7);
  color:white;letter-spacing:2px;text-transform:uppercase;
  box-shadow:0 0 30px rgba(79,195,247,0.4);
  transition:transform 0.15s,box-shadow 0.15s;margin-top:8px;
}
.play-btn:hover{transform:scale(1.06);box-shadow:0 0 50px rgba(79,195,247,0.7);}
.final-n{font-family:'Comfortaa',cursive;font-size:3rem;font-weight:700;
  color:var(--neon-yellow);text-shadow:0 0 20px var(--neon-yellow);margin:10px 0;}
.fstats{display:flex;gap:14px;justify-content:center;margin:14px 0 22px;flex-wrap:wrap;}
.fst{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:10px 16px;}
.fst span{font-family:'Comfortaa',cursive;font-size:1.2rem;font-weight:700;color:var(--neon-blue);display:block;}
.fst small{font-size:0.6rem;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;font-weight:800;}
.ov-emoji{font-size:3rem;display:block;margin-bottom:8px;animation:em-b 1s ease-in-out infinite;}
@keyframes em-b{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ── MOBILE ── */
@media(max-width:600px){
  #hud{gap:14px;padding:10px 16px;top:10px;border-radius:18px;}
  .hud-stat .val{font-size:1rem;}
  .hud-stat .ico{font-size:1rem;}
  #prog-wrap{top:72px;}
  .word-card{font-size:1.15rem;padding:10px 20px;}
  #input-zone{bottom:16px;width:96vw;}
  #word-input{font-size:1.2rem;padding:15px 20px;}
  #submit-btn{display:flex!important;}
  .deco-letter{display:none;}
  #combo{right:6px;top:120px;}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="aurora"></div>

<!-- DECORATIVE FLOATING LETTERS -->
<div class="deco-letter" style="left:5%;top:25%;color:#4fc3f7;animation-duration:5s;animation-delay:0s;">Е</div>
<div class="deco-letter" style="left:12%;top:55%;color:#c084fc;animation-duration:7s;animation-delay:-2s;">Ш</div>
<div class="deco-letter" style="right:8%;top:20%;color:#f472b6;animation-duration:6s;animation-delay:-1s;">А</div>
<div class="deco-letter" style="right:14%;top:50%;color:#fde047;animation-duration:4.5s;animation-delay:-3s;">М</div>
<div class="deco-letter" style="left:22%;top:68%;color:#fb923c;animation-duration:8s;animation-delay:-4s;font-size:1.2rem;">О</div>
<div class="deco-letter" style="right:22%;top:65%;color:#39ff14;animation-duration:5.5s;animation-delay:-1.5s;font-size:1.1rem;">Б</div>

<!-- CLOUDS -->
<svg class="cloud" style="left:2%;top:22%;width:150px;animation-duration:7s;animation-delay:0s;" viewBox="0 0 150 70" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="75" cy="52" rx="62" ry="20" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="52" cy="38" rx="34" ry="24" fill="rgba(255,255,255,0.07)"/>
  <ellipse cx="90" cy="34" rx="30" ry="22" fill="rgba(255,255,255,0.07)"/>
  <ellipse cx="74" cy="32" rx="36" ry="22" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="75" cy="52" rx="62" ry="20" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
</svg>
<svg class="cloud" style="right:3%;top:15%;width:190px;animation-duration:9s;animation-delay:-3s;" viewBox="0 0 190 85" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="95" cy="64" rx="78" ry="23" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="64" cy="48" rx="42" ry="28" fill="rgba(255,255,255,0.07)"/>
  <ellipse cx="118" cy="42" rx="36" ry="26" fill="rgba(255,255,255,0.07)"/>
  <ellipse cx="93" cy="40" rx="44" ry="26" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="95" cy="64" rx="78" ry="23" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
</svg>
<svg class="cloud" style="left:35%;top:8%;width:120px;animation-duration:6s;animation-delay:-5s;" viewBox="0 0 120 56" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="60" cy="42" rx="50" ry="16" fill="rgba(255,255,255,0.05)"/>
  <ellipse cx="42" cy="30" rx="28" ry="20" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="76" cy="26" rx="24" ry="18" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="60" cy="24" rx="30" ry="18" fill="rgba(255,255,255,0.05)"/>
</svg>
<svg class="cloud" style="left:60%;bottom:20%;width:140px;animation-duration:8s;animation-delay:-2s;" viewBox="0 0 140 66" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="70" cy="50" rx="58" ry="18" fill="rgba(255,255,255,0.05)"/>
  <ellipse cx="48" cy="36" rx="32" ry="22" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="86" cy="32" rx="28" ry="20" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="70" cy="30" rx="32" ry="20" fill="rgba(255,255,255,0.05)"/>
</svg>

<!-- HUD -->
<div id="hud">
  <div class="hud-stat"><span class="ico">⭐</span><span class="val" id="sv">0</span></div>
  <div style="width:1px;height:24px;background:rgba(255,255,255,0.15);"></div>
  <div class="hud-stat"><span class="ico">🎯</span><span class="val" id="lv">1</span></div>
  <div style="width:1px;height:24px;background:rgba(255,255,255,0.15);"></div>
  <div class="hud-stat"><span class="ico">📈</span><span class="val" id="av">100%</span></div>
  <div style="width:1px;height:24px;background:rgba(255,255,255,0.15);"></div>
  <div class="hud-stat"><span class="ico">❤️</span><div id="lives-val">
    <span class="heart" id="h1">❤️</span>
    <span class="heart" id="h2">❤️</span>
    <span class="heart" id="h3">❤️</span>
  </div></div>
</div>

<!-- PROGRESS BAR -->
<div id="prog-wrap">
  <div id="prog-bg"><div id="prog-fill"></div></div>
  <div id="prog-lbl">0/10</div>
</div>

<!-- COMBO -->
<div id="combo"><span id="combo-n">x2</span><span id="combo-lbl">🔥 комбо</span></div>

<!-- CORRECT BADGE -->
<div id="correct-badge">✅ ВЕРНО! <span id="badge-pts">+10</span></div>

<!-- GAME AREA -->
<div id="game-area"></div>

<!-- INPUT -->
<div id="input-zone">
  <div id="input-row">
    <input id="word-input" type="text" placeholder="Введите слово целиком..." autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" disabled/>
    <button id="submit-btn">✓</button>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">

<script>
// ── STARS ──
const sc=document.getElementById('stars');
const sx=sc.getContext('2d');
let stars=[];
function initStars(){
  sc.width=window.innerWidth;sc.height=window.innerHeight;
  stars=Array.from({length:220},()=>({
    x:Math.random()*sc.width,y:Math.random()*sc.height*0.8,
    r:Math.random()*1.4+0.3,a:Math.random(),da:(Math.random()-0.5)*0.012
  }));
}
function drawStars(){
  sx.clearRect(0,0,sc.width,sc.height);
  stars.forEach(s=>{
    s.a+=s.da; if(s.a<0.05||s.a>1)s.da*=-1;
    sx.beginPath();sx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sx.fillStyle=`rgba(255,255,255,${s.a})`;sx.fill();
    if(s.r>1.1){
      sx.beginPath();sx.arc(s.x,s.y,s.r*2.5,0,Math.PI*2);
      sx.fillStyle=`rgba(255,255,255,${s.a*0.12})`;sx.fill();
    }
  });
  requestAnimationFrame(drawStars);
}
initStars();drawStars();
window.addEventListener('resize',initStars);

// ── GAME STATE ──
const WORDS=['около','солома','вокруг','потом','растение','приветливо','ромашка','трамвай','пятница','кровать','рябина','однажды','герой','комната','самолет','антенна','коллекция','пассажир','колледж','хоккей','кроссворд','коллектив','терраса','бассейн','аппетит','грамматика','теннис','суббота','лестница','четверг','чувство','шоссе','столица','овощи'];
const SPARKS=['⭐','🌟','✨','💫','🎇','🌸','💜','💙','💚','💛'];
const isMob=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)||window.innerWidth<600;
function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}

let score=0,lives=3,level=1,combo=0,maxCombo=0,totalAtt=0,correctAtt=0,wordsDone=0;
let running=false,onScreen=[],spawnT=null,diffT=null;
let pool=shuffle(WORDS),poolIdx=0;

function getAcc(){return totalAtt===0?100:Math.round(correctAtt/totalAtt*100);}
function getLvlCfg(){
  const sm=isMob?0.42:1, im=isMob?1.8:1;
  return{
    speed:(28+level*5)*sm,
    interval:Math.max(isMob?2400:1000,(3000-level*180)*im),
    maxW:isMob?Math.min(1+Math.floor(level/3),3):Math.min(2+Math.floor(level/2),5)
  };
}

function updateHUD(){
  document.getElementById('sv').textContent=score;
  document.getElementById('lv').textContent=level;
  document.getElementById('av').textContent=getAcc()+'%';
  // hearts
  for(let i=1;i<=3;i++){
    const h=document.getElementById('h'+i);
    h.classList.toggle('lost',i>lives);
  }
  const done=wordsDone%10;
  document.getElementById('prog-fill').style.width=(done*10)+'%';
  document.getElementById('prog-lbl').textContent=done+'/10';
}

document.getElementById('start-btn').onclick=startGame;
document.getElementById('restart-btn').onclick=()=>{
  document.getElementById('ov-end').style.display='none';
  document.getElementById('ov-start').style.display='';
  startGame();
};

function startGame(){
  document.getElementById('overlay').style.display='none';
  score=0;lives=3;level=1;combo=0;maxCombo=0;totalAtt=0;correctAtt=0;wordsDone=0;
  onScreen.forEach(w=>w.el.remove());onScreen=[];
  pool=shuffle(WORDS);poolIdx=0;
  updateHUD();
  const inp=document.getElementById('word-input');
  inp.disabled=false;inp.value='';inp.focus();
  running=true;
  scheduleSpawn();startDiff();
}

function endGame(){
  running=false;clearTimeout(spawnT);clearInterval(diffT);
  onScreen.forEach(w=>w.el.remove());onScreen=[];
  const inp=document.getElementById('word-input');
  inp.disabled=true;inp.value='';
  document.getElementById('final-n').textContent=score;
  document.getElementById('fs-w').textContent=wordsDone;
  document.getElementById('fs-a').textContent=getAcc()+'%';
  document.getElementById('fs-l').textContent=level;
  document.getElementById('fs-c').textContent=maxCombo;
  document.getElementById('end-emoji').textContent=score>200?'🏆':score>80?'🎉':'😊';
  document.getElementById('ov-start').style.display='none';
  document.getElementById('ov-end').style.display='';
  document.getElementById('overlay').style.display='flex';
}

function startDiff(){diffT=setInterval(()=>{if(!running)return;level=Math.min(10,1+Math.floor(wordsDone/10));updateHUD();},800);}
function scheduleSpawn(){
  if(!running)return;
  spawnT=setTimeout(()=>{
    if(running){if(onScreen.length<getLvlCfg().maxW)spawnWord();scheduleSpawn();}
  },getLvlCfg().interval);
}
function nextWord(){if(poolIdx>=pool.length){pool=shuffle(WORDS);poolIdx=0;}return pool[poolIdx++];}
function makeBlank(word){
  const len=word.length;
  const idx=Math.floor(Math.random()*(len-2))+1;
  return{display:word.slice(0,idx)+'_'+word.slice(idx+1),answer:word};
}

function spawnWord(){
  const word=nextWord();
  const{display,answer}=makeBlank(word);
  const el=document.createElement('div');
  el.className='word-card wc'+(Math.floor(Math.random()*5));
  el.innerHTML=display.replace('_','<span class="blank">_</span>');
  const maxX=Math.max(20,window.innerWidth-220);
  el.style.left=Math.floor(Math.random()*maxX)+'px';
  el.style.top='-90px';
  document.getElementById('game-area').appendChild(el);
  const obj={el,answer,y:-90,active:true};
  onScreen.push(obj);
  animateWord(obj);
}

function animateWord(obj){
  let last=null;
  const LIMIT=window.innerHeight-100;
  function frame(ts){
    if(!obj.active||!running)return;
    if(!last)last=ts;
    obj.y+=getLvlCfg().speed*(ts-last)/1000;
    last=ts;
    obj.el.style.top=obj.y+'px';
    if(obj.y>LIMIT){missWord(obj);return;}
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function missWord(obj){
  if(!obj.active)return;
  obj.active=false;
  onScreen=onScreen.filter(w=>w!==obj);
  obj.el.classList.add('miss-anim');
  combo=0;updateCombo();lives--;updateHUD();
  setTimeout(()=>obj.el.remove(),450);
  if(lives<=0)endGame();
}

const inp=document.getElementById('word-input');
const subBtn=document.getElementById('submit-btn');
function doSubmit(){
  const t=inp.value.trim().toLowerCase();
  if(!t)return;inp.value='';checkInput(t);inp.focus();
}
inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doSubmit();}});
subBtn.addEventListener('click',doSubmit);
inp.addEventListener('input',()=>{
  const t=inp.value.trim().toLowerCase();
  onScreen.forEach(w=>{
    if(w.active)w.el.style.outline=t.length>1&&w.answer.startsWith(t)?'2px solid rgba(57,255,20,0.7)':'none';
  });
});

function checkInput(t){
  totalAtt++;
  let hit=null;
  for(const w of onScreen){if(w.active&&w.answer===t){hit=w;break;}}
  if(hit){correctAtt++;hitWord(hit);}
  else{flash('bad');combo=0;updateCombo();updateHUD();}
}

function hitWord(obj){
  obj.active=false;
  onScreen=onScreen.filter(w=>w!==obj);
  wordsDone++;combo++;
  if(combo>maxCombo)maxCombo=combo;
  const pts=10*level+(combo>1?(combo-1)*5:0);
  score+=pts;
  level=Math.min(10,1+Math.floor(wordsDone/10));
  spawnParticles(obj.el);floatScore(pts,obj.el);
  obj.el.classList.add('hit-anim');
  onScreen.forEach(w=>{if(w.el)w.el.style.outline='none';});
  setTimeout(()=>obj.el.remove(),450);
  flash('ok');updateCombo();updateHUD();
  showBadge(pts);
}

function showBadge(pts){
  const b=document.getElementById('correct-badge');
  document.getElementById('badge-pts').textContent='+'+pts;
  b.classList.remove('show');void b.offsetWidth;b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),800);
}

function flash(cls){
  inp.classList.remove('ok','bad');void inp.offsetWidth;
  inp.classList.add(cls);setTimeout(()=>inp.classList.remove(cls),350);
}
function updateCombo(){
  const el=document.getElementById('combo');
  if(combo>=2){document.getElementById('combo-n').textContent='x'+combo;el.classList.add('show');}
  else el.classList.remove('show');
}
function spawnParticles(refEl){
  const r=refEl.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<12;i++){
    const p=document.createElement('div');p.className='sparkle';
    const a=Math.random()*Math.PI*2,d=50+Math.random()*80;
    p.style.cssText=`left:${cx}px;top:${cy}px;--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;`;
    p.textContent=SPARKS[Math.floor(Math.random()*SPARKS.length)];
    document.body.appendChild(p);setTimeout(()=>p.remove(),950);
  }
}
function floatScore(pts,refEl){
  const r=refEl.getBoundingClientRect();
  const el=document.createElement('div');el.className='float-pts';
  el.textContent='+'+pts;
  const cols=['#4fc3f7','#c084fc','#f472b6','#fde047','#39ff14'];
  el.style.cssText=`left:${r.left+r.width/2-24}px;top:${r.top}px;color:${cols[Math.floor(Math.random()*cols.length)]};text-shadow:0 0 10px currentColor;`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1050);
}
document.addEventListener('keydown',e=>{if(running&&e.target!==inp)inp.focus();});
document.getElementById('game-area').addEventListener('touchstart',()=>{if(running)inp.focus();},{passive:true});
</script>
</body>
</html>
